# Servo motor configuration
#
# esp_min / esp_max  — raw servo position range (from Robot Joints diagram)
# angle_min / angle_max — joint angle limits in radians (from URDF / IK ranges PDF)
# Midpoint of esp range = calibrated zero angle.
#
# flip: if true, reverses the angle→ESP mapping direction
#        (angle_min → esp_max, angle_max → esp_min)
# offset: radians added to the joint angle before mapping (for mechanical alignment)
# esp: which ESP32 board the servo is on ("tc" or "m")
# prefix: serial command prefix ("t:" for STS on tc, "c:" for SCS on tc, "" for m)

servos:
  # -- Head (tc board, STS) ------------------------------------------------
  - name: head_yaw
    servo_id: 8
    esp: tc
    prefix: "t:"
    flip: true
    offset: 0.0
    esp_min: 1024
    esp_max: 3072
    angle_min: -1.5708
    angle_max:  1.5708

  - name: head_pitch
    servo_id: 9
    esp: tc
    prefix: "t:"
    flip: true
    offset: 0.0
    esp_min: 1024
    esp_max: 3072
    angle_min: -1.5708
    angle_max:  1.5708

  # -- Right arm (IDs 1-6 on tc STS, ID 7 on m) ---------------------------
